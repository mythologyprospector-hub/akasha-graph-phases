repo:
  name: akasha-graph-phases
  ecosystem: akasha
  version: 0.1.0
  status: active

engine:
  family: relationship
  class: graph_engine
  role: phase_and_relation_modeling

identity:
  role: engine
  layer: structure
  description: >
    Graph phase engine for the Akasha constellation.
    Responsible for modeling graph states, transitions, phases,
    and relation structures across connected entities and domains.

ownership:
  steward: human
  approval_required: true

interfaces:
  consumes:
    - ontology_models
    - linked_entities
    - transition_records
  produces:
    - graph_phase_models
    - transition_maps
    - relation_structures

capabilities:
  - graph_phase_modeling
  - transition_mapping
  - relation_structure_generation
  - connected_state_analysis

alignment:
  axioms_required: true
  canonical_structure: true
  interpretation_free_core: true

depends_on:
  - akasha-ontology

# ---- Canonical sections added by akasha-canon ----
type: organ

family: discovery

role: graph-phases

